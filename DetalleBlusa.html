<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle Producto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --primary-color: #6f42c1;
      --secondary-color: #9c6ade;
      --dark-color: #2d0247;
    }

    .navbar { background: var(--dark-color); }

    .btn-primary {
      background-color: var(--primary-color);
      border: none;
    }

    .btn-primary:hover {
      background-color: var(--secondary-color);
    }

    .price {
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--primary-color);
    }

    .product-img {
      border-radius: 10px;
      width: 100%;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="Principal.html">Vibra Urbana</a>
  </div>
</nav>

<!-- Detalle Producto -->
<section class="py-5">
  <div class="container">
    <div class="row">

      <!-- Imagen -->
      <div class="col-md-6">
        <img src="https://images.unsplash.com/photo-1774005906344-57048d3f5856?q=80&w=764&auto=format&fit=crop"
             class="product-img" alt="Blusa">
      </div>

      <!-- Información -->
      <div class="col-md-6">
        <h2>Blusa Casual de Verano</h2>
        <p class="text-muted">Categoría: Mujer</p>

        <p>
          Blusa ligera y fresca, ideal para climas cálidos. Tela suave, diseño moderno
          y perfecta para uso diario o salidas casuales.
        </p>

        <p class="price">$25.00</p>

        <!-- Tallas -->
        <div class="mb-3">
          <label class="form-label">Talla:</label>
          <select class="form-select">
            <option>S</option>
            <option>M</option>
            <option>L</option>
          </select>
        </div>

        <!-- Cantidad -->
        <div class="mb-3">
          <label class="form-label">Cantidad:</label>
          <input type="number" class="form-control" value="1" min="1">
        </div>

        <!-- Botones -->
        <button class="btn btn-primary me-2">Agregar al carrito</button>
        <a href="Principal.html" class="btn btn-outline-secondary">Volver</a>

      </div>

    </div>
  </div>
</section>

<!-- Footer -->
<footer class="text-white text-center py-3" style="background:#2d0247;">
  <div class="container">
    <p class="mb-0">&copy; 2025 Vibra Urbana</p>
  </div>
</footer>

</body>
</html>
