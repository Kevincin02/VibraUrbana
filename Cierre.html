<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cierre de Caja</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { background: #f5f2fb; }

.card-header {
    background: #6f42c1;
    color: white;
    font-weight: bold;
}

.total-box {
    font-size: 1.2rem;
    font-weight: bold;
    color: #6f42c1;
}
</style>
</head>

<body>

<div class="container mt-5">

<div class="card">
<div class="card-header">Cierre de Caja</div>

<div class="card-body">

<!-- FILTRO -->
<div class="row mb-3">
    <div class="col-md-4">
        <label>Filtrar por fecha</label>
        <input type="date" id="filtroFecha" class="form-control">
    </div>

    <div class="col-md-4 d-flex align-items-end">
        <button class="btn btn-primary w-100" onclick="filtrar()">Filtrar</button>
    </div>

    <div class="col-md-4 d-flex align-items-end">
        <button class="btn btn-success w-100" onclick="exportarPDF()">Exportar PDF</button>
    </div>
</div>

<!-- TABLA -->
<div class="table-responsive">
<table class="table table-striped">
<thead>
<tr>
<th>ID</th>
<th>Cliente</th>
<th>Total</th>
<th>Fecha</th>
</tr>
</thead>
<tbody id="tablaVentas"></tbody>
</table>
</div>

<!-- TOTAL -->
<div class="text-end total-box">
Total del día: ₡ <span id="totalDia">0</span>
</div>

</div>
</div>

</div>

<script>

// 🔹 DATOS DE PRUEBA
const ventas = JSON.parse(localStorage.getItem("ventas")) || [
    {id:1, cliente:"Juan", total:15000, fecha:"2026-04-15"},
    {id:2, cliente:"Ana", total:22000, fecha:"2026-04-15"},
    {id:3, cliente:"Luis", total:18000, fecha:"2026-04-14"}
];

// 🔹 MOSTRAR TODAS AL INICIO
mostrarVentas(ventas);

// 🔹 FILTRAR
function filtrar(){
    const fecha = document.getElementById("filtroFecha").value;

    const filtradas = ventas.filter(v => v.fecha === fecha);

    mostrarVentas(filtradas);
}

// 🔹 RENDER
function mostrarVentas(lista){
    const tabla = document.getElementById("tablaVentas");
    tabla.innerHTML = "";

    let total = 0;

    lista.forEach(v => {
        total += v.total;

        tabla.innerHTML += `
        <tr>
            <td>${v.id}</td>
            <td>${v.cliente}</td>
            <td>₡ ${v.total}</td>
            <td>${v.fecha}</td>
        </tr>`;
    });

    document.getElementById("totalDia").textContent = total;
}

// 🔹 PDF
function exportarPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.text("Cierre de Caja", 10, 10);

    let y = 20;

    ventas.forEach(v => {
        doc.text(`${v.cliente} - ₡${v.total} - ${v.fecha}`, 10, y);
        y += 10;
    });

    doc.text("Total: ₡ " + document.getElementById("totalDia").textContent, 10, y+10);

    doc.save("cierre_caja.pdf");
}

</script>

</body>
</html>
