<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f0f4f8;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card {
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
    }

    .btn {
      border-radius: 12px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .table th,
    .table td {
      vertical-align: middle;
    }
  </style>
</head>

<body>
  <div class="container mt-5">
    <div class="card p-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Inventario de Productos</h3>
        <button class="btn btn-primary">Agregar Producto</button>
      </div>

      <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Categoría</th>
              <th>Stock</th>
              <th>Precio</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>101</td>
              <td>Blusa Tirantes</td>
              <td>Mujer</td>
              <td>25</td>
              <td>$15.00</td>
              <td><span class="badge bg-success">En stock</span></td>
            </tr>
            <tr>
              <td>102</td>
              <td>Camiseta Básica</td>
              <td>Hombre</td>
              <td>0</td>
              <td>$12.00</td>
              <td><span class="badge bg-danger">Agotado</span></td>
            </tr>
            <tr>
              <td>103</td>
              <td>Jeans Slim Fit</td>
              <td>Hombre</td>
              <td>12</td>
              <td>$35.00</td>
              <td><span class="badge bg-success">En stock</span></td>
            </tr>
            <tr>
              <td>104</td>
              <td>Vestido Floral</td>
              <td>Mujer</td>
              <td>5</td>
              <td>$28.00</td>
              <td><span class="badge bg-warning text-dark">Pocas unidades</span></td>
            </tr>
            <tr>
              <td>105</td>
              <td>Chaqueta Denim</td>
              <td>Unisex</td>
              <td>18</td>
              <td>$45.00</td>
              <td><span class="badge bg-success">En stock</span></td>
            </tr>
          </tbody>
        </table>
      </div>
      <button class="btn btn-secondary" onclick="history.back()">Regresar</button>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
