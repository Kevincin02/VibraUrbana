<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeans Slim Fit</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --primary-color: #6f42c1;
      --secondary-color: #9c6ade;
      --dark-color: #2d0247;
    }
    .navbar { background: var(--dark-color); }
    .btn-primary { background-color: var(--primary-color); border: none; }
    .btn-primary:hover { background-color: var(--secondary-color); }
    .price { font-size: 1.8rem; font-weight: bold; color: var(--primary-color); }
    .product-img { border-radius: 10px; width: 100%; }
  </style>
</head>

<body>

<nav class="navbar navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="Principal.html">Vibra Urbana</a>
  </div>
</nav>

<section class="py-5">
  <div class="container">
    <div class="row">

      <div class="col-md-6">
        <img src="https://images.unsplash.com/photo-1714143136372-ddaf8b606da7?q=80&w=880&auto=format&fit=crop"
             class="product-img" alt="Jeans">
      </div>

      <div class="col-md-6">
        <h2>Jeans Slim Fit</h2>
        <p class="text-muted">Categoría: Hombre</p>

        <p>
          Jeans de corte ajustado con excelente comodidad y resistencia.
          Perfectos para outfits casuales o urbanos.
        </p>

        <p class="price">$35.00</p>

        <div class="mb-3">
          <label class="form-label">Talla:</label>
          <select class="form-select">
            <option>28</option>
            <option>30</option>
            <option>32</option>
            <option>34</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Cantidad:</label>
          <input type="number" class="form-control" value="1" min="1">
        </div>

        <button class="btn btn-primary me-2">Agregar al carrito</button>
        <a href="Principal.html" class="btn btn-outline-secondary">Volver</a>
      </div>

    </div>
  </div>
</section>

</body>
</html>
