<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitud de Proforma</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #e0f7fa, #ffffff);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      border-radius: 20px;
      box-shadow: 0px 8px 20px rgba(0,0,0,0.1);
    }
    .form-control {
      border-radius: 12px;
    }
    .btn-success {
      border-radius: 12px;
      padding: 10px;
      font-weight: bold;
      width: 100%;
      transition: 0.3s;
    }
    .btn-success:hover {
      background-color: #2e7d32;
      transform: scale(1.02);
    }
    h2 {
      font-weight: 600;
      color: #2c3e50;
    }
  </style>
</head>
<body>
  <div class="container d-flex justify-content-center align-items-center vh-40">
    <div class="col-md-6">
      <div class="card p-4">
        <h2 class="text-center mb-4">Solicitud de Proforma</h2>
        <form id="proformaForm">
          <!-- Información del solicitante -->
          <div class="mb-3">
            <label for="nombreSolicitante" class="form-label">Nombre del solicitante</label>
            <input type="text" class="form-control" id="nombreSolicitante" placeholder="Juan Pérez" required>
          </div>
          <div class="mb-3">
            <label for="correoSolicitante" class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" id="correoSolicitante" placeholder="correo@ejemplo.com" required>
          </div>
          <div class="mb-3">
            <label for="telefonoSolicitante" class="form-label">Teléfono</label>
            <input type="tel" class="form-control" id="telefonoSolicitante" placeholder="8888-8888" required>
          </div>

          <!-- Detalles del producto/servicio -->
          <div class="mb-3">
            <label for="producto" class="form-label">Producto o servicio</label>
            <input type="text" class="form-control" id="producto" placeholder="Nombre del producto" required>
          </div>
          <div class="mb-3">
            <label for="cantidad" class="form-label">Cantidad</label>
            <input type="number" class="form-control" id="cantidad" placeholder="10" min="1" required>
          </div>
          <div class="mb-3">
            <label for="detalleAdicional" class="form-label">Detalles adicionales</label>
            <textarea class="form-control" id="detalleAdicional" rows="3" placeholder="Especificaciones o comentarios"></textarea>
          </div>

          <!-- Botón enviar -->
          <button type="submit" class="btn btn-success">Solicitar Proforma</button>
        </form>
             <div>
          .
             </div>
                  <!-- Botón regresar -->
       <button class="btn btn-secondary" onclick="history.back()">Regresar</button>
      </div>
    </div>
  </div>

      </div>
    </div>
  </div>


  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    document.getElementById("proformaForm").addEventListener("submit", function(event) {
      event.preventDefault(); // Evita que se recargue la página
      alert("✅ Solicitud enviada");

      // Redirigir al indexCliente
      window.location.href = "indexCliente.html";
    });
  </script>
</body>
</html>
