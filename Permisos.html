<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Permisos</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4 text-center">Panel de Administración - Permisos de Usuarios</h2>

        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <i class="bi bi-shield-lock-fill"></i> Lista de Usuarios
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Usuario</th>
                                <th>Email</th>
                                <th class="text-center">Lectura</th>
                                <th class="text-center">Escritura</th>
                                <th class="text-center">Administración</th>
                                <th class="text-center">Encomienda</th>
                                <th class="text-center">Proforma</th>
                                <th class="text-center">Inventario</th>
                                <th class="text-center">Garantías</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Juan Pérez</td>
                                <td>juan@example.com</td>
                                <td class="text-center"><input type="checkbox"></td>
                                <td class="text-center"><input type="checkbox"></td>
                                <td class="text-center"><input type="checkbox"></td>
                                <td class="text-center"><input type="checkbox"></td>
                                <td class="text-center"><input type="checkbox"></td>
                                <td class="text-center"><input type="checkbox"></td>
                                <td class="text-center"><input type="checkbox"></td>
                            </tr>
                            <tr>
                                <td>María López</td>
                                <td>maria@example.com</td>
                                <td class="text-center"><input type="checkbox" checked></td>
                                <td class="text-center"><input type="checkbox"></td>
                                <td class="text-center"><input type="checkbox"></td>
                                <td class="text-center"><input type="checkbox" checked></td>
                                <td class="text-center"><input type="checkbox"></td>
                                <td class="text-center"><input type="checkbox"></td>
                                <td class="text-center"><input type="checkbox"></td>
                            </tr>
                            <tr>
                                <td>Carlos Ruiz</td>
                                <td>carlos@example.com</td>
                                <td class="text-center"><input type="checkbox" checked></td>
                                <td class="text-center"><input type="checkbox" checked></td>
                                <td class="text-center"><input type="checkbox"></td>
                                <td class="text-center"><input type="checkbox"></td>
                                <td class="text-center"><input type="checkbox" checked></td>
                                <td class="text-center"><input type="checkbox" checked></td>
                                <td class="text-center"><input type="checkbox"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="d-flex justify-content-end mt-3">
                    <button class="btn btn-success"><i class="bi bi-save-fill"></i> Guardar Cambios</button>
                                <!-- Botón regresar -->
       <button class="btn btn-secondary" onclick="history.back()">Regresar</button>
      </div>
    </div>
  </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
