<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encomiendas</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #f1f8ff, #ffffff);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      border-radius: 20px;
      box-shadow: 0px 8px 20px rgba(0,0,0,0.1);
    }
    .form-control, .form-select {
      border-radius: 12px;
    }
    .btn-primary, .btn-secondary {
      border-radius: 12px;
      padding: 10px;
      font-weight: bold;
      width: 100%;
      transition: 0.3s;
      margin-top: 10px;
    }
    .btn-primary:hover {
      background-color: #0d47a1;
      transform: scale(1.02);
    }
    .btn-secondary:hover {
      background-color: #424242;
      transform: scale(1.02);
      color: white;
    }
    h2 {
      font-weight: 600;
      color: #1a237e;
    }
  </style>
</head>
<body>
  <div class="container d-flex justify-content-center align-items-center vh-40">
    <div class="col-md-6">
      <div class="card p-4">
        <h2 class="text-center mb-4">Formulario de Envío de Paquete</h2>
        <form id="encomiendaForm">
          <!-- Información del remitente -->
          <div class="mb-3">
            <label for="remitente" class="form-label">Nombre del remitente</label>
            <input type="text" class="form-control" id="remitente" placeholder="Juan Pérez" required>
          </div>
          <div class="mb-3">
            <label for="telefonoRemitente" class="form-label">Teléfono del remitente</label>
            <input type="tel" class="form-control" id="telefonoRemitente" placeholder="8888-8888" required>
          </div>

          <!-- Información del destinatario -->
          <div class="mb-3">
            <label for="destinatario" class="form-label">Nombre del destinatario</label>
            <input type="text" class="form-control" id="destinatario" placeholder="María Gómez" required>
          </div>
          <div class="mb-3">
            <label for="telefonoDestinatario" class="form-label">Teléfono del destinatario</label>
            <input type="tel" class="form-control" id="telefonoDestinatario" placeholder="8888-8888" required>
          </div>

          <!-- Dirección -->
          <div class="mb-3">
            <label for="direccion" class="form-label">Dirección de entrega</label>
            <input type="text" class="form-control" id="direccion" placeholder="Calle 123, San José" required>
          </div>

          <!-- Detalles del paquete -->
          <div class="mb-3">
            <label for="peso" class="form-label">Peso del paquete (kg)</label>
            <input type="number" class="form-control" id="peso" placeholder="5" min="0.1" step="0.1" required>
          </div>
          <div class="mb-3">
            <label for="tipoEnvio" class="form-label">Tipo de envío</label>
            <select class="form-select" id="tipoEnvio" required>
              <option value="" selected disabled>Selecciona</option>
              <option value="normal">Normal</option>
              <option value="express">Express</option>
            </select>
          </div>

          <!-- Botones -->
          <button type="submit" class="btn btn-primary">Enviar paquete</button>
         <button class="btn btn-secondary" onclick="history.back()">Regresar</button>
      </div>
    </div>
  </div>

  <!-- Modal de alerta -->
  <div class="modal fade" id="alertaModal" tabindex="-1" aria-labelledby="alertaLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4 shadow">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title" id="alertaLabel">¡Envío exitoso!</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body fs-6" id="mensajePaquete">
          Su paquete ha sido enviado correctamente.
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-success" data-bs-dismiss="modal">Aceptar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    document.getElementById('encomiendaForm').addEventListener('submit', function(e) {
      e.preventDefault(); // Evita recargar la página

      // Mostrar modal de éxito
      const alertaModal = new bootstrap.Modal(document.getElementById('alertaModal'));
      alertaModal.show();

      // Opcional: reiniciar el formulario
      this.reset();
    });
  </script>
</body>
</html>
